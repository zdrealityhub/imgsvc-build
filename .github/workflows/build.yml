name: Build All Platforms

run-name: Build All Platforms (${{ inputs.release_tag }})

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Source branch, tag, or commit from zdrealityhub/imgsvc
        required: true
        default: main
      release_tag:
        description: Release tag associated with this build
        required: true
        default: manual
      build_no:
        description: Build number associated with this build
        required: true
        default: "0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Checkout private source repo
        uses: actions/checkout@v4
        with:
          repository: zdrealityhub/imgsvc
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.IMGSVC_SOURCE_READ }}
          path: source

      - name: Restore Linux build cache
        uses: actions/cache@v4
        with:
          path: |
            source/build
            source/bin/linux-x64
          key: linux-build-${{ runner.os }}-${{ inputs.source_ref }}-${{ hashFiles('source/CMakeLists.txt', 'source/server.cpp', 'source/include/**', 'source/scripts/build.js') }}

      - name: Validate archive password
        run: |
          set -euo pipefail
          if [ -z "${ARTIFACT_ARCHIVE_PASSWORD:-}" ]; then
            echo "ARTIFACT_ARCHIVE_PASSWORD is not available to this workflow."
            echo "Grant it to repo: ${GITHUB_REPOSITORY}"
            exit 1
          fi
        env:
          ARTIFACT_ARCHIVE_PASSWORD: ${{ secrets.ARTIFACT_ARCHIVE_PASSWORD }}

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libjpeg-dev libpng-dev p7zip-full

      - name: Build Linux x64 binary
        working-directory: source
        run: node scripts/build.js

      - name: Stage artifact
        env:
          ARTIFACT_ARCHIVE_PASSWORD: ${{ secrets.ARTIFACT_ARCHIVE_PASSWORD }}
        run: |
          mkdir -p artifacts
          cp source/bin/linux-x64/imgsvc artifacts/imgsvc
          (
            cd artifacts
            7z a -tzip -mem=AES256 -p"${ARTIFACT_ARCHIVE_PASSWORD}" imgsvc-linux-x64.zip imgsvc >/dev/null
          )
          rm -f artifacts/imgsvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imgsvc-linux-x64-${{ inputs.release_tag }}
          path: artifacts/imgsvc-linux-x64.zip
          if-no-files-found: error
          retention-days: 1

  build-win-x64:
    name: Build Windows x64
    runs-on: windows-2022
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Checkout private source repo
        uses: actions/checkout@v4
        with:
          repository: zdrealityhub/imgsvc
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.IMGSVC_SOURCE_READ }}
          path: source

      - name: Restore Windows build cache
        uses: actions/cache@v4
        with:
          path: |
            source/build-win-native
            source/bin/win32-x64
          key: win-build-${{ runner.os }}-${{ inputs.source_ref }}-${{ hashFiles('source/CMakeLists.txt', 'source/server.cpp', 'source/include/**', 'source/scripts/build.js') }}

      - name: Validate archive password
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ARTIFACT_ARCHIVE_PASSWORD:-}" ]; then
            echo "ARTIFACT_ARCHIVE_PASSWORD is not available to this workflow."
            echo "Grant it to repo: ${GITHUB_REPOSITORY}"
            exit 1
          fi
        env:
          ARTIFACT_ARCHIVE_PASSWORD: ${{ secrets.ARTIFACT_ARCHIVE_PASSWORD }}

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          cache: true
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-libpng
            p7zip

      - name: Build Windows x64 binary
        shell: msys2 {0}
        working-directory: source
        run: node scripts/build.js

      - name: Diagnose Windows payload
        shell: msys2 {0}
        run: |
          set -euo pipefail
          echo "MSYSTEM=${MSYSTEM:-}"
          echo "MINGW_PREFIX=${MINGW_PREFIX:-}"
          echo "MSYSTEM_PREFIX=${MSYSTEM_PREFIX:-}"
          echo "PATH=$PATH"

          for tool in node gcc g++ objdump ldd cygpath 7z; do
            echo "--- which ${tool} ---"
            command -v "$tool" || true
          done

          echo "--- win32-x64 contents ---"
          ls -la source/bin/win32-x64 || true

          echo "--- win32-x64 files ---"
          find source/bin/win32-x64 -maxdepth 1 -type f -print | sort || true

          echo "--- objdump imports ---"
          objdump -p source/bin/win32-x64/imgsvc.exe | sed -n '/DLL Name:/p' || true

          echo "--- ldd output ---"
          ldd source/bin/win32-x64/imgsvc.exe || true

          dll_count=$(find source/bin/win32-x64 -maxdepth 1 -type f \( -iname '*.dll' -o -iname '*.DLL' \) | wc -l | tr -d ' ')
          echo "DLL count in source/bin/win32-x64: ${dll_count}"
          if [ "${dll_count}" -eq 0 ]; then
            echo "No DLLs were staged into source/bin/win32-x64"
            exit 1
          fi

      - name: Stage artifact
        shell: msys2 {0}
        env:
          ARTIFACT_ARCHIVE_PASSWORD: ${{ secrets.ARTIFACT_ARCHIVE_PASSWORD }}
        run: |
          mkdir -p artifacts
          cp source/bin/win32-x64/* artifacts/

          (
            cd artifacts
            7z a -tzip -mem=AES256 -p"${ARTIFACT_ARCHIVE_PASSWORD}" imgsvc-win-x64.zip * >/dev/null
          )

          find artifacts -maxdepth 1 -type f ! -name 'imgsvc-win-x64.zip' -delete

      - name: Diagnose Windows artifact archive
        shell: msys2 {0}
        run: |
          set -euo pipefail
          echo "--- artifacts dir contents ---"
          ls -la artifacts
          echo "--- zip listing ---"
          7z l artifacts/imgsvc-win-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imgsvc-win-x64-${{ inputs.release_tag }}
          path: artifacts/imgsvc-win-x64.zip
          if-no-files-found: error
          retention-days: 1

  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-14
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Checkout private source repo
        uses: actions/checkout@v4
        with:
          repository: zdrealityhub/imgsvc
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.IMGSVC_SOURCE_READ }}
          path: source

      - name: Restore macOS build cache
        uses: actions/cache@v4
        with:
          path: |
            source/build
            source/bin/darwin-arm64
          key: macos-build-${{ runner.os }}-${{ inputs.source_ref }}-${{ hashFiles('source/CMakeLists.txt', 'source/server.cpp', 'source/include/**', 'source/scripts/build.js') }}

      - name: Restore Homebrew cache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Validate archive password
        run: |
          set -euo pipefail
          if [ -z "${ARTIFACT_ARCHIVE_PASSWORD:-}" ]; then
            echo "ARTIFACT_ARCHIVE_PASSWORD is not available to this workflow."
            echo "Grant it to repo: ${GITHUB_REPOSITORY}"
            exit 1
          fi
        env:
          ARTIFACT_ARCHIVE_PASSWORD: ${{ secrets.ARTIFACT_ARCHIVE_PASSWORD }}

      - name: Install native dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install cmake pkg-config jpeg-turbo libpng p7zip

      - name: Build macOS arm64 binary
        working-directory: source
        run: node scripts/build.js

      - name: Stage artifact
        env:
          ARTIFACT_ARCHIVE_PASSWORD: ${{ secrets.ARTIFACT_ARCHIVE_PASSWORD }}
        run: |
          mkdir -p artifacts
          cp source/bin/darwin-arm64/imgsvc artifacts/imgsvc
          (
            cd artifacts
            7z a -tzip -mem=AES256 -p"${ARTIFACT_ARCHIVE_PASSWORD}" imgsvc-macos-arm64.zip imgsvc >/dev/null
          )
          rm -f artifacts/imgsvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imgsvc-macos-arm64-${{ inputs.release_tag }}
          path: artifacts/imgsvc-macos-arm64.zip
          if-no-files-found: error
          retention-days: 1
