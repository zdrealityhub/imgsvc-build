name: Build All Platforms

run-name: Build All Platforms (${{ inputs.release_tag }})

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Source branch, tag, or commit from zdrealityhub/imgsvc
        required: true
        default: main
      release_tag:
        description: Release tag associated with this build
        required: true
        default: manual
      build_no:
        description: Build number associated with this build
        required: true
        default: "0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Checkout private source repo
        uses: actions/checkout@v4
        with:
          repository: zdrealityhub/imgsvc
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.IMGSVC_SOURCE_READ }}
          path: source

      - name: Restore Linux build cache
        uses: actions/cache@v4
        with:
          path: |
            source/build
            source/bin/linux-x64
          key: linux-build-${{ runner.os }}-${{ inputs.source_ref }}-${{ hashFiles('source/CMakeLists.txt', 'source/server.cpp', 'source/include/**', 'source/scripts/build.js') }}

      - name: Validate archive password
        run: |
          set -euo pipefail
          if [ -z "${ARTIFACT_ARCHIVE_PASSWORD:-}" ]; then
            echo "ARTIFACT_ARCHIVE_PASSWORD is not available to this workflow."
            echo "Grant it to repo: ${GITHUB_REPOSITORY}"
            exit 1
          fi
        env:
          ARTIFACT_ARCHIVE_PASSWORD: ${{ secrets.ARTIFACT_ARCHIVE_PASSWORD }}

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libjpeg-dev libpng-dev p7zip-full

      - name: Build Linux x64 binary
        working-directory: source
        run: node scripts/build.js

      - name: Stage artifact
        env:
          ARTIFACT_ARCHIVE_PASSWORD: ${{ secrets.ARTIFACT_ARCHIVE_PASSWORD }}
        run: |
          mkdir -p artifacts
          cp source/bin/linux-x64/imgsvc artifacts/imgsvc
          (
            cd artifacts
            7z a -tzip -mem=AES256 -p"${ARTIFACT_ARCHIVE_PASSWORD}" imgsvc-linux-x64.zip imgsvc >/dev/null
          )
          rm -f artifacts/imgsvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imgsvc-linux-x64-${{ inputs.release_tag }}
          path: artifacts/imgsvc-linux-x64.zip
          if-no-files-found: error
          retention-days: 1

  build-win-x64:
    name: Build Windows x64
    runs-on: windows-2022
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Checkout private source repo
        uses: actions/checkout@v4
        with:
          repository: zdrealityhub/imgsvc
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.IMGSVC_SOURCE_READ }}
          path: source

      - name: Restore Windows build cache
        uses: actions/cache@v4
        with:
          path: |
            source/build-win-native
            source/bin/win32-x64
          key: win-build-${{ runner.os }}-${{ inputs.source_ref }}-${{ hashFiles('source/CMakeLists.txt', 'source/server.cpp', 'source/include/**', 'source/scripts/build.js') }}

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/downloads
            vcpkg/packages
            vcpkg/installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml', 'source/CMakeLists.txt') }}

      - name: Validate archive password
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ARTIFACT_ARCHIVE_PASSWORD)) {
            throw "ARTIFACT_ARCHIVE_PASSWORD is not available to this workflow."
          }
        env:
          ARTIFACT_ARCHIVE_PASSWORD: ${{ secrets.ARTIFACT_ARCHIVE_PASSWORD }}

      - name: Set up MSVC toolchain
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path vcpkg)) {
            git clone --depth 1 https://github.com/microsoft/vcpkg vcpkg
          }

          if (-not (Test-Path vcpkg\vcpkg.exe)) {
            & .\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          }

      - name: Install Windows dependencies
        shell: pwsh
        run: |
          & .\vcpkg\vcpkg.exe install libjpeg-turbo:x64-windows-static libpng:x64-windows-static

      - name: Verify Windows toolchain shell
        shell: pwsh
        run: |
          Write-Host "PATH=$env:PATH"
          where.exe node
          node --version
          where.exe cmake
          where.exe cl
          where.exe link
          where.exe dumpbin
          where.exe 7z

      - name: Build Windows x64 binary
        shell: pwsh
        working-directory: source
        env:
          CMAKE_TOOLCHAIN_FILE: ${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake
          VCPKG_TARGET_TRIPLET: x64-windows-static
          IMGSVC_WINDOWS_GENERATOR: Visual Studio 17 2022
        run: |
          node scripts/build.js

      - name: Diagnose Windows payload
        shell: pwsh
        run: |
          Get-ChildItem source\bin\win32-x64 | Format-Table -AutoSize
          Write-Host "--- dumpbin /dependents ---"
          dumpbin /dependents source\bin\win32-x64\imgsvc.exe

      - name: Stage artifact
        shell: pwsh
        env:
          ARTIFACT_ARCHIVE_PASSWORD: ${{ secrets.ARTIFACT_ARCHIVE_PASSWORD }}
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item source\bin\win32-x64\* artifacts\
          Push-Location artifacts
          & 7z a -tzip -mem=AES256 "-p$env:ARTIFACT_ARCHIVE_PASSWORD" imgsvc-win-x64.zip * | Out-Null
          Pop-Location
          Get-ChildItem artifacts -File | Where-Object { $_.Name -ne 'imgsvc-win-x64.zip' } | Remove-Item -Force

      - name: Diagnose Windows artifact archive
        shell: pwsh
        run: |
          Get-ChildItem artifacts | Format-Table -AutoSize
          & 7z l artifacts\imgsvc-win-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imgsvc-win-x64-${{ inputs.release_tag }}
          path: artifacts/imgsvc-win-x64.zip
          if-no-files-found: error
          retention-days: 1

  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-14
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Checkout private source repo
        uses: actions/checkout@v4
        with:
          repository: zdrealityhub/imgsvc
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.IMGSVC_SOURCE_READ }}
          path: source

      - name: Restore macOS build cache
        uses: actions/cache@v4
        with:
          path: |
            source/build
            source/bin/darwin-arm64
          key: macos-build-${{ runner.os }}-${{ inputs.source_ref }}-${{ hashFiles('source/CMakeLists.txt', 'source/server.cpp', 'source/include/**', 'source/scripts/build.js') }}

      - name: Restore Homebrew cache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Validate archive password
        run: |
          set -euo pipefail
          if [ -z "${ARTIFACT_ARCHIVE_PASSWORD:-}" ]; then
            echo "ARTIFACT_ARCHIVE_PASSWORD is not available to this workflow."
            echo "Grant it to repo: ${GITHUB_REPOSITORY}"
            exit 1
          fi
        env:
          ARTIFACT_ARCHIVE_PASSWORD: ${{ secrets.ARTIFACT_ARCHIVE_PASSWORD }}

      - name: Install native dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install cmake pkg-config jpeg-turbo libpng p7zip

      - name: Build macOS arm64 binary
        working-directory: source
        run: node scripts/build.js

      - name: Stage artifact
        env:
          ARTIFACT_ARCHIVE_PASSWORD: ${{ secrets.ARTIFACT_ARCHIVE_PASSWORD }}
        run: |
          mkdir -p artifacts
          cp source/bin/darwin-arm64/imgsvc artifacts/imgsvc
          (
            cd artifacts
            7z a -tzip -mem=AES256 -p"${ARTIFACT_ARCHIVE_PASSWORD}" imgsvc-macos-arm64.zip imgsvc >/dev/null
          )
          rm -f artifacts/imgsvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imgsvc-macos-arm64-${{ inputs.release_tag }}
          path: artifacts/imgsvc-macos-arm64.zip
          if-no-files-found: error
          retention-days: 1
