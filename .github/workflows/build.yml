name: Build All Platforms

run-name: Build All Platforms (${{ inputs.release_tag }})

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Source branch, tag, or commit from zdrealityhub/imgsvc
        required: true
        default: main
      release_tag:
        description: Release tag associated with this build
        required: true
        default: manual
      build_no:
        description: Build number associated with this build
        required: true
        default: "0"

jobs:
  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Checkout private source repo
        uses: actions/checkout@v4
        with:
          repository: zdrealityhub/imgsvc
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.IMGSVC_SOURCE_READ }}
          path: source

      - name: Validate archive password
        run: |
          set -euo pipefail
          if [ -z "${ARTIFACT_ARCHIVE_PASSWORD:-}" ]; then
            echo "ARTIFACT_ARCHIVE_PASSWORD is not available to this workflow."
            echo "Grant it to repo: ${GITHUB_REPOSITORY}"
            exit 1
          fi
        env:
          ARTIFACT_ARCHIVE_PASSWORD: ${{ secrets.ARTIFACT_ARCHIVE_PASSWORD }}

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libjpeg-dev libpng-dev p7zip-full

      - name: Build Linux x64 binary
        working-directory: source
        run: node scripts/build.js

      - name: Stage artifact
        env:
          ARTIFACT_ARCHIVE_PASSWORD: ${{ secrets.ARTIFACT_ARCHIVE_PASSWORD }}
        run: |
          mkdir -p artifacts
          cp source/bin/linux-x64/imgsvc artifacts/imgsvc
          (
            cd artifacts
            7z a -tzip -mem=AES256 -p"${ARTIFACT_ARCHIVE_PASSWORD}" imgsvc-linux-x64.zip imgsvc >/dev/null
          )
          rm -f artifacts/imgsvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imgsvc-linux-x64-${{ inputs.release_tag }}
          path: artifacts/imgsvc-linux-x64.zip
          if-no-files-found: error
          retention-days: 1

  build-win-x64:
    name: Build Windows x64
    runs-on: windows-2022
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Checkout private source repo
        uses: actions/checkout@v4
        with:
          repository: zdrealityhub/imgsvc
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.IMGSVC_SOURCE_READ }}
          path: source

      - name: Validate archive password
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ARTIFACT_ARCHIVE_PASSWORD:-}" ]; then
            echo "ARTIFACT_ARCHIVE_PASSWORD is not available to this workflow."
            echo "Grant it to repo: ${GITHUB_REPOSITORY}"
            exit 1
          fi
        env:
          ARTIFACT_ARCHIVE_PASSWORD: ${{ secrets.ARTIFACT_ARCHIVE_PASSWORD }}

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-libpng
            p7zip

      - name: Build Windows x64 binary
        shell: msys2 {0}
        run: |
          set -euo pipefail
          cmake -S source -B source/build-win-native -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-DWINVER=0x0A00 -D_WIN32_WINNT=0x0A00" \
            -DCMAKE_CXX_FLAGS="-DWINVER=0x0A00 -D_WIN32_WINNT=0x0A00"
          cmake --build source/build-win-native --config Release

      - name: Stage artifact
        shell: msys2 {0}
        env:
          ARTIFACT_ARCHIVE_PASSWORD: ${{ secrets.ARTIFACT_ARCHIVE_PASSWORD }}
        run: |
          mkdir -p artifacts
          cp source/build-win-native/imgsvc.exe artifacts/imgsvc.exe
          (
            cd artifacts
            7z a -tzip -mem=AES256 -p"${ARTIFACT_ARCHIVE_PASSWORD}" imgsvc-win-x64.zip imgsvc.exe >/dev/null
          )
          rm -f artifacts/imgsvc.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imgsvc-win-x64-${{ inputs.release_tag }}
          path: artifacts/imgsvc-win-x64.zip
          if-no-files-found: error
          retention-days: 1

  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-14
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Checkout private source repo
        uses: actions/checkout@v4
        with:
          repository: zdrealityhub/imgsvc
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.IMGSVC_SOURCE_READ }}
          path: source

      - name: Validate archive password
        run: |
          set -euo pipefail
          if [ -z "${ARTIFACT_ARCHIVE_PASSWORD:-}" ]; then
            echo "ARTIFACT_ARCHIVE_PASSWORD is not available to this workflow."
            echo "Grant it to repo: ${GITHUB_REPOSITORY}"
            exit 1
          fi
        env:
          ARTIFACT_ARCHIVE_PASSWORD: ${{ secrets.ARTIFACT_ARCHIVE_PASSWORD }}

      - name: Install native dependencies
        run: |
          brew install cmake pkg-config jpeg-turbo libpng p7zip

      - name: Build macOS arm64 binary
        working-directory: source
        run: node scripts/build.js

      - name: Stage artifact
        env:
          ARTIFACT_ARCHIVE_PASSWORD: ${{ secrets.ARTIFACT_ARCHIVE_PASSWORD }}
        run: |
          mkdir -p artifacts
          cp source/bin/darwin-arm64/imgsvc artifacts/imgsvc
          (
            cd artifacts
            7z a -tzip -mem=AES256 -p"${ARTIFACT_ARCHIVE_PASSWORD}" imgsvc-macos-arm64.zip imgsvc >/dev/null
          )
          rm -f artifacts/imgsvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imgsvc-macos-arm64-${{ inputs.release_tag }}
          path: artifacts/imgsvc-macos-arm64.zip
          if-no-files-found: error
          retention-days: 1
